<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estudios CAPIAF — Mapa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F3F0E9; }

    #header {
      background: #2E4238;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    #header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #header p { font-size: 0.78rem; color: rgba(255,255,255,0.55); margin-top: 0.2rem; }

    #search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 0.4rem 1rem;
    }
    #search-box input {
      background: none;
      border: none;
      outline: none;
      color: white;
      font-size: 0.82rem;
      width: 200px;
    }
    #search-box input::placeholder { color: rgba(255,255,255,0.4); }

    #map { height: calc(100vh - 70px); width: 100%; }

    /* Custom marker */
    .custom-marker {
      background: #6E9080;
      border: 2px solid #2E4238;
      border-radius: 50%;
      width: 12px;
      height: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .custom-marker:hover { background: #2E4238; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      border: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .popup-content { padding: 0.2rem 0; min-width: 180px; }
    .popup-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: #2E4238;
      margin-bottom: 0.3rem;
    }
    .popup-desc {
      font-size: 0.78rem;
      color: #555;
      font-style: italic;
      margin: 0.3rem 0 0.35rem;
      line-height: 1.45;
    }
    .popup-addr {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.2rem;
    }
    .popup-fix {
      display: block;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      color: #6E9080;
      text-decoration: none;
      border-top: 1px solid #f0f0f0;
      padding-top: 0.5rem;
    }
    .popup-fix:hover { text-decoration: underline; }
    .popup-barrio {
      display: inline-block;
      font-size: 0.7rem;
      background: #EEF4F1;
      color: #6E9080;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 50px;
      margin-top: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .counter {
      background: #6E9080;
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>CAPIAF — Estudios Asociados</h1>
    <p>Cámara de Pilates y Afines de la Ciudad Autónoma de Buenos Aires</p>
  </div>
  <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
    <div id="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar estudio o barrio..." />
    </div>
    <div class="counter" id="counter">68 estudios</div>
  </div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Map init — centered on CABA
const map = L.map('map', {
  center: [-34.613, -58.443],
  zoom: 13,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19,
}).addTo(map);

// Custom icon
function makeIcon(color = '#6E9080') {
  return L.divIcon({
    className: '',
    html: `<div style="
      background:${color};
      border:2.5px solid #2E4238;
      border-radius:50%;
      width:14px;height:14px;
      box-shadow:0 2px 6px rgba(0,0,0,0.35);
      transition:all .2s;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10],
  });
}

// Studios data with pre-geocoded coordinates (Buenos Aires addresses)
// Ubicaciones estimadas: se usan solo para estudios que todavia no fijaron su pin desde el portal
// Lista histórica eliminada: el mapa se alimenta únicamente de los estudios registrados
const estudiosBase = [];

const markers = [];
const markerLayer = L.layerGroup().addTo(map);

const sb = supabase.createClient(
  'https://rpxckpqptdgkkwaqtgzz.supabase.co',
  'sb_publishable_QqQ4vWOitcfzNREsG3SoHA_rJAkTMDQ'
);

function renderMarkers(lista) {
  lista.forEach(e => {
    if (!e.lat) return;

    const marker = L.marker([e.lat, e.lng], { icon: makeIcon() });

    const waMsg = encodeURIComponent(`Hola CAPIAF, la ubicación de ${e.name} en el mapa no es correcta. La dirección es ${e.addr}.`);
    const popup = `
      <div class="popup-content">
        <div class="popup-name">${e.name}</div>
        ${e.desc ? `<div class="popup-desc">${e.desc}</div>` : ''}
        ${e.addr ? `<div class="popup-addr">📍 ${e.addr}</div>` : ''}
        ${e.barrio ? `<span class="popup-barrio">${e.barrio}</span>` : ''}
        ${e.fijado
          ? ''
          : `<a href="https://wa.me/5491153588840?text=${waMsg}" target="_blank" rel="noopener" class="popup-fix">¿Ubicación incorrecta? Avisanos</a>`}
      </div>`;

    marker.bindPopup(popup, { maxWidth: 240 });
    marker.addTo(markerLayer);
    markers.push({ marker, data: e });
  });
  const count = markers.length;
  const counter = document.getElementById('counter');
  if (counter) counter.textContent = count + ' estudio' + (count !== 1 ? 's' : '');
}

async function cargarEstudios() {
  let lista = [...estudiosBase];
  const norm = s => (s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\b(pilates|estudio|estudios|espacio|studio|de|el|la)\b/g, '')
    .replace(/[^a-z0-9]/g, '');
  const mismoEstudio = (a, b) => {
    a = norm(a); b = norm(b);
    return a && b && (a.includes(b) || b.includes(a));
  };

  try {
    const { data } = await sb
      .from('estudios')
      .select('nombre, descripcion, direccion, numero, barrio, lat, lng, sedes(nombre, direccion, numero, barrio, lat, lng)')
      .eq('aprobado', true)
      .eq('activo', true);

    (data || []).forEach(e => {
      // Pin fijado por el propio estudio: reemplaza la ubicacion estimada
      if (e.lat && e.lng) {
        lista = lista.filter(l => !mismoEstudio(l.name, e.nombre));
        lista.push({
          name: e.nombre,
          desc: e.descripcion || '',
          addr: `${e.direccion || ''} ${e.numero || ''}`.trim(),
          barrio: e.barrio || '',
          lat: e.lat, lng: e.lng, fijado: true
        });
      }
      // Sedes adicionales con pin propio
      (e.sedes || []).forEach(s => {
        if (s.lat && s.lng) lista.push({
          name: e.nombre + (s.nombre ? ' · ' + s.nombre : ''),
          desc: e.descripcion || '',
          addr: `${s.direccion || ''} ${s.numero || ''}`.trim(),
          barrio: s.barrio || '',
          lat: s.lat, lng: s.lng, fijado: true
        });
      });
    });
  } catch (err) {
    // si falla la base, el mapa sigue funcionando con las ubicaciones estimadas
  }

  renderMarkers(lista);
}

cargarEstudios();

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  let count = 0;
  
  markers.forEach(({ marker, data }) => {
    const match = !q || 
      data.name.toLowerCase().includes(q) || 
      (data.barrio && data.barrio.toLowerCase().includes(q)) ||
      (data.addr && data.addr.toLowerCase().includes(q));
    
    if (match) {
      marker.addTo(markerLayer);
      marker.setIcon(makeIcon(q ? '#2E4238' : '#6E9080'));
      count++;
    } else {
      markerLayer.removeLayer(marker);
    }
  });
  
  document.getElementById('counter').textContent = count + ' estudio' + (count !== 1 ? 's' : '');
});
</script>
</body>
</html>
