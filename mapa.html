      background: #2E4238;

      font-size: 0.82rem;
      width: 200px;
    }
    #search-box input::placeholder { color: rgba(255,255,255,0.4); }

    #map { height: calc(100vh - 70px); width: 100%; }

    /* Custom marker */
    .custom-marker {
      background: #6E9080;
      border: 2px solid #2E4238;
      border-radius: 50%;
      width: 12px;
      height: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .custom-marker:hover { background: #2E4238; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      border: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .popup-content { padding: 0.2rem 0; min-width: 180px; }
    .popup-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: #2E4238;
      margin-bottom: 0.3rem;
    }
    .popup-addr {

    .popup-barrio {

      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      white-space: nowrap;

// Custom icon

      border:2.5px solid #2E4238;
      border-radius:50%;
      width:14px;height:14px;
      box-shadow:0 2px 6px rgba(0,0,0,0.35);
      transition:all .2s;
    "></div>`,

}

const markers = [];
const markerLayer = L.layerGroup().addTo(map);

estudios.forEach(e => {
  if (!e.lat) return;
  
  const marker = L.marker([e.lat, e.lng], { icon: makeIcon() });
  
  const popup = `
    <div class="popup-content">
      <div class="popup-name">${e.name}</div>
      ${e.addr ? `<div class="popup-addr">📍 ${e.addr}</div>` : ''}
      ${e.barrio ? `<span class="popup-barrio">${e.barrio}</span>` : ''}
    </div>`;
  
  marker.bindPopup(popup, { maxWidth: 240 });
  marker.addTo(markerLayer);
  markers.push({ marker, data: e });
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  let count = 0;
  
  markers.forEach(({ marker, data }) => {
    const match = !q || 
      data.name.toLowerCase().includes(q) || 
      (data.barrio && data.barrio.toLowerCase().includes(q)) ||
      (data.addr && data.addr.toLowerCase().includes(q));
    
    if (match) {
      marker.addTo(markerLayer);
      marker.setIcon(makeIcon(q ? '#2E4238' : '#6E9080'));
      count++;
    } else {
      markerLayer.removeLayer(marker);
    }
  });
  
  document.getElementById('counter').textContent = `${count} estudio${count !== 1 ? 's' : ''}`;
});
