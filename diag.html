<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico mapa CAPIAF</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: monospace; font-size: 13px; padding: 1rem; background: #f7f5ef; color: #232A26; }
  h2 { font-size: 15px; }
  pre { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: .8rem; white-space: pre-wrap; word-break: break-all; }
  .err { border-color: #c0392b; color: #c0392b; }
  .ok { border-color: #2E8B57; }
</style>
</head>
<body>
<h2>Diagnóstico de la consulta del mapa</h2>
<div id="out">Consultando...</div>
<script>
const sb = supabase.createClient(
  'https://rpxckpqptdgkkwaqtgzz.supabase.co',
  'sb_publishable_QqQ4vWOitcfzNREsG3SoHA_rJAkTMDQ'
);

(async () => {
  const out = document.getElementById('out');
  let html = '';

  // 1. Consulta exacta del mapa
  const q1 = await sb
    .from('estudios')
    .select('nombre, descripcion, direccion, numero, barrio, lat, lng, sedes(nombre, direccion, numero, barrio, lat, lng)')
    .eq('aprobado', true)
    .eq('activo', true);
  html += '<h2>1) Consulta completa (la del mapa)</h2>';
  html += `<pre class="${q1.error ? 'err' : 'ok'}">error: ${JSON.stringify(q1.error, null, 2)}\n\ndata: ${JSON.stringify(q1.data, null, 2)}</pre>`;

  // 2. Solo estudios, sin sedes
  const q2 = await sb
    .from('estudios')
    .select('nombre, lat, lng')
    .eq('aprobado', true)
    .eq('activo', true);
  html += '<h2>2) Solo estudios (sin sedes)</h2>';
  html += `<pre class="${q2.error ? 'err' : 'ok'}">error: ${JSON.stringify(q2.error, null, 2)}\n\ndata: ${JSON.stringify(q2.data, null, 2)}</pre>`;

  // 3. Solo sedes
  const q3 = await sb.from('sedes').select('nombre, lat, lng');
  html += '<h2>3) Solo sedes</h2>';
  html += `<pre class="${q3.error ? 'err' : 'ok'}">error: ${JSON.stringify(q3.error, null, 2)}\n\ndata: ${JSON.stringify(q3.data, null, 2)}</pre>`;

  out.innerHTML = html;
})();
</script>
</body>
</html>
